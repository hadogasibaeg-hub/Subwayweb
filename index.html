<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울 메트로 맵 (HTML 버전)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        @keyframes fadeInSlide { 
            from { transform: translateY(20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .animate-in { animation: fadeInSlide 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        #map-layer {
            transform-origin: 0 0;
            will-change: transform;
        }

        .station-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: opacity 0.4s ease;
        }

        .station-circle {
            position: absolute;
            border-radius: 50%;
            border-style: solid;
            background-color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            transform: translate(-50%, -50%);
            transition: all 0.2s ease;
        }
        .station-circle:hover { transform: translate(-50%, -50%) scale(1.25); }
        .station-circle.selected {
            transform: translate(-50%, -50%) scale(1.8);
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.4);
        }

        .station-label {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 700;
            padding: 0 4px;
            transition: all 0.2s ease;
            text-shadow: 0px 2px 4px rgba(0,0,0,1);
            display: block;
        }
        .station-label.selected {
            color: #818cf8;
            transform: translateX(-50%) scale(1.25);
            background-color: rgba(15, 23, 42, 0.8);
            border-radius: 4px;
        }
    </style>
</head>
<body class="flex h-screen w-screen relative">

    <!-- 사이드바 -->
    <aside id="sidebar" class="fixed left-0 top-0 z-[110] h-full w-80 bg-[#1e293b] shadow-2xl transition-transform duration-300 ease-in-out translate-x-0">
        <div class="p-6 flex flex-col h-full overflow-hidden">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-600 rounded-lg">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">서울 메트로 맵</h1>
                </div>
                <button onclick="toggleMenu()" class="p-2 hover:bg-white/10 rounded-full text-slate-400 hover:text-white transition-colors">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <div class="relative mb-6">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input id="search-input" class="w-full bg-slate-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all" placeholder="역 이름을 검색하세요...">
            </div>

            <div class="flex-1 overflow-y-auto space-y-1 pr-2 custom-scrollbar">
                <p class="text-[10px] text-slate-500 font-bold uppercase mb-3 tracking-widest px-2">노선 필터링</p>
                <div id="line-filters"></div>
            </div>
        </div>
    </aside>

    <!-- 메인 맵 영역 -->
    <main id="map-container" class="relative flex-1 bg-[#0b1120] overflow-hidden cursor-grab touch-none">
        
        <!-- 숨겨졌을 때 나타나는 메뉴 버튼 -->
        <button id="menu-btn" onclick="toggleMenu()" class="hidden absolute top-6 left-6 z-50 p-4 bg-indigo-600 rounded-2xl shadow-xl hover:bg-indigo-500 transition-all hover:scale-105 active:scale-95">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <!-- 캔버스 레이어 -->
        <div id="map-layer" class="absolute inset-0">
            <svg id="svg-layer" width="4000" height="4000" class="absolute top-0 left-0 pointer-events-none overflow-visible"></svg>
            <div id="station-layer" class="absolute top-0 left-0 w-[4000px] h-[4000px]"></div>
        </div>

        <!-- 하단 줌 컨트롤러 -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-3 bg-slate-900/90 backdrop-blur-xl px-5 py-3 rounded-2xl border border-white/10 shadow-2xl z-[100]">
            <button onclick="handleZoom(0.7)" class="p-2 hover:bg-white/10 rounded-xl text-slate-400 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
            </button>
            <span id="zoom-text" class="text-[11px] font-mono w-14 text-center text-indigo-400 font-bold tracking-tighter">80%</span>
            <button onclick="handleZoom(1.4)" class="p-2 hover:bg-white/10 rounded-xl text-slate-400 transition-colors">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
            </button>
            <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
            <button onclick="resetView()" class="p-2 hover:bg-white/10 rounded-xl text-slate-400 transition-colors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
            </button>
        </div>

        <!-- 상세 정보 카드 -->
        <div id="detail-card" class="hidden absolute bottom-24 right-8 w-72 bg-slate-900/95 backdrop-blur-md border border-white/10 rounded-3xl p-6 shadow-2xl z-[100] animate-in">
            <div class="flex justify-between items-start mb-5">
                <h2 id="detail-title" class="text-2xl font-black tracking-tight"></h2>
                <button onclick="closeDetail()" class="p-1.5 hover:bg-white/10 rounded-full text-slate-500 hover:text-white transition-colors">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <p class="text-[9px] text-slate-500 font-bold mb-3 tracking-[0.2em] uppercase">경유 노선</p>
                    <div id="detail-lines" class="flex flex-wrap gap-2"></div>
                </div>
                <button class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-xs font-black shadow-lg shadow-indigo-500/25 active:scale-95 transition-all uppercase tracking-widest">
                    실시간 열차 정보
                </button>
            </div>
        </div>
    </main>

": {x: 1650, y: 2100}, "시청·용인대": {x: 1750, y: 2100}, "명지대": {x: 1850, y: 2100}, "김량장": {x: 1950, y: 2100}, "운동장·송담대": {x: 2050, y: 2100}, "고진": {x: 2100, y: 2150}, "보평": {x: 2100, y: 2200}, "둔전": {x: 2100, y: 2250}, "전대·에버랜드": {x: 2100, y: 2350}, "북한산우이": {x: 1250, y: 500}, "솔밭공원": {x: 1250, y: 550}, "4.19민주묘지": {x: 1250, y: 600}, "가오리": {x: 1250, y: 650}, "화계": {x: 1250, y: 700}, "삼양": {x: 1250, y: 750}, "삼양사거리": {x: 1250, y: 800}, "솔샘": {x: 1250, y: 850}, "북한산보국문": {x: 1250, y: 900}, "정릉": {x: 1250, y: 950}
        };

        // --- 전역 상태 ---
        const state = {
            transform: { x: 0, y: 0, scale: 0.8 },
            selectedStation: null,
            isMenuOpen: true,
            searchTerm: "",
            highlightLine: null,
            isDragging: false,
            lastPos: { x: 0, y: 0 }
        };

        // 노선 포함 여부 계산 (중복 렌더링 방지)
        const stationMembership = {};
        Object.entries(lines).forEach(([id, line]) => {
            line.stations.forEach(s => {
                if (!stationMembership[s]) stationMembership[s] = [];
                stationMembership[s].push({ id, name: line.name, color: line.color });
            });
        });

        // --- DOM 요소 참조 ---
        const mapContainer = document.getElementById('map-container');
        const mapLayer = document.getElementById('map-layer');
        const svgLayer = document.getElementById('svg-layer');
        const stationLayer = document.getElementById('station-layer');
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menu-btn');
        const zoomText = document.getElementById('zoom-text');
        const searchInput = document.getElementById('search-input');
        const lineFilters = document.getElementById('line-filters');
        const detailCard = document.getElementById('detail-card');

        // --- 초기화 ---
        function init() {
            renderSidebarFilters();
            renderMap();
            
            // 중앙 정렬 (서울역 기준)
            setTimeout(() => {
                moveTo(stationsData["서울역"].x, stationsData["서울역"].y, 0.7);
            }, 100);

            // 이벤트 리스너 등록
            searchInput.addEventListener('input', handleSearch);
            
            // 마우스 드래그
            mapContainer.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', stopDragging);
            
            // 터치 드래그
            mapContainer.addEventListener('touchstart', onTouchStart, {passive: false});
            window.addEventListener('touchmove', onTouchMove, {passive: false});
            window.addEventListener('touchend', stopDragging);
        }

        // --- 이동 및 확대 ---
        function applyTransform() {
            mapLayer.style.transform = `translate(${state.transform.x}px, ${state.transform.y}px) scale(${state.transform.scale})`;
            zoomText.innerText = `${Math.round(state.transform.scale * 100)}%`;
        }

        function moveTo(x, y, customScale = null) {
            const currentScale = customScale || state.transform.scale;
            const centerX = mapContainer.clientWidth / 2;
            const centerY = mapContainer.clientHeight / 2;
            state.transform.scale = currentScale;
            state.transform.x = centerX - (x * currentScale);
            state.transform.y = centerY - (y * currentScale);
            applyTransform();
        }

        window.handleZoom = function(factor) {
            const newScale = Math.min(3.0, Math.max(0.15, state.transform.scale * factor));
            const centerX = mapContainer.clientWidth / 2;
            const centerY = mapContainer.clientHeight / 2;
            state.transform.x = centerX - ((centerX - state.transform.x) / state.transform.scale) * newScale;
            state.transform.y = centerY - ((centerY - state.transform.y) / state.transform.scale) * newScale;
            state.transform.scale = newScale;
            applyTransform();
        };

        window.resetView = function() {
            state.transform.scale = 0.7;
            moveTo(stationsData["서울역"].x, stationsData["서울역"].y, 0.7);
            state.searchTerm = "";
            state.highlightLine = null;
            state.selectedStation = null;
            searchInput.value = "";
            renderSidebarFilters();
            renderMap();
            renderDetailCard();
        };

        // --- 렌더링 로직 ---
        function renderSidebarFilters() {
            let html = '';
            Object.entries(lines).filter(([_, l]) => !l.isBranch).forEach(([id, line]) => {
                const isHighlighted = state.highlightLine === line.name;
                const btnClass = isHighlighted 
                    ? 'bg-indigo-600/20 border-indigo-500 text-white' 
                    : 'bg-white/5 border-transparent text-slate-400 hover:bg-white/10 hover:text-white';
                
                html += `
                    <button onclick="toggleHighlight('${line.name}')" class="w-full flex items-center gap-3 p-3 rounded-xl border transition-all ${btnClass} mb-2">
                        <div class="w-3 h-3 rounded-full shrink-0" style="background-color: ${line.color}"></div>
                        <span class="text-xs font-semibold truncate text-left">${line.name}</span>
                    </button>
                `;
            });
            lineFilters.innerHTML = html;
        }

        function renderMap() {
            // SVG 노선
            let svgHtml = '';
            Object.entries(lines).forEach(([id, line]) => {
                const pts = line.stations.map(s => stationsData[s]).filter(Boolean).map(p => `${p.x},${p.y}`).join(' ');
                const isDimmed = state.highlightLine && state.highlightLine !== line.name;
                const opacity = isDimmed ? 0.08 : 0.85;
                svgHtml += `<polyline points="${pts}" stroke="${line.color}" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" style="opacity: ${opacity}; transition: opacity 0.4s ease;"></polyline>`;
            });
            svgLayer.innerHTML = svgHtml;

            // HTML 역 노드
            let stHtml = '';
            Object.entries(stationsData).forEach(([name, pos]) => {
                const myLines = stationMembership[name] || [];
                const isTransfer = myLines.length > 1;
                const isSelected = state.selectedStation === name;
                const isSearchMatch = !state.searchTerm || name.includes(state.searchTerm);
                const isLineMatch = !state.highlightLine || myLines.some(l => l.name === state.highlightLine);
                const opacity = (isSearchMatch && isLineMatch) ? 1 : 0.12;
                
                const zIndex = isSelected ? 100 : (isTransfer ? 30 : 20);
                const borderColor = isTransfer ? '#334155' : (myLines[0]?.color || '#fff');
                const circleClass = isSelected ? 'scale-[1.8] ring-4 ring-indigo-500/40 border-indigo-500' : 'hover:scale-125 border-slate-700';
                const textClass = isSelected ? 'text-indigo-400 scale-125 bg-slate-900/80' : 'text-white';

                stHtml += `
                    <div class="station-node" style="left: ${pos.x}px; top: ${pos.y}px; opacity: ${opacity}; z-index: ${zIndex};">
                        <div onclick="selectStation(event, '${name}')" class="station-circle ${circleClass}" style="width: 18px; height: 18px; border-color: ${borderColor}; border-width: 3px;"></div>
                        <div class="station-label ${textClass}">${name}</div>
                    </div>
                `;
            });
            stationLayer.innerHTML = stHtml;
        }

        function renderDetailCard() {
            if (state.selectedStation) {
                detailCard.classList.remove('hidden');
                document.getElementById('detail-title').innerText = state.selectedStation;
                
                const linesHtml = (stationMembership[state.selectedStation] || []).map(l => `
                    <div class="flex items-center gap-2 px-3 py-2 bg-white/5 rounded-xl border border-white/5">
                        <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${l.color}"></div>
                        <span class="text-[11px] font-bold text-slate-200">${l.name}</span>
                    </div>
                `).join('');
                document.getElementById('detail-lines').innerHTML = linesHtml;
            } else {
                detailCard.classList.add('hidden');
            }
        }

        // --- 상호작용 핸들러 ---
        window.toggleMenu = function() {
            state.isMenuOpen = !state.isMenuOpen;
            if (state.isMenuOpen) {
                sidebar.classList.remove('-translate-x-full');
                menuBtn.classList.add('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                menuBtn.classList.remove('hidden');
            }
        };

        window.toggleHighlight = function(lineName) {
            state.highlightLine = state.highlightLine === lineName ? null : lineName;
            renderSidebarFilters();
            renderMap();
        };

        window.selectStation = function(e, name) {
            e.stopPropagation();
            state.selectedStation = name;
            moveTo(stationsData[name].x, stationsData[name].y);
            renderMap();
            renderDetailCard();
        };

        window.closeDetail = function() {
            state.selectedStation = null;
            renderMap();
            renderDetailCard();
        };

        function handleSearch(e) {
            state.searchTerm = e.target.value;
            renderMap();
            
            if (state.searchTerm.length >= 1) {
                const match = Object.keys(stationsData).find(name => name === state.searchTerm);
                if (match) {
                    moveTo(stationsData[match].x, stationsData[match].y, 1.2);
                    state.selectedStation = match;
                    renderDetailCard();
                    renderMap(); // re-render with selection
                }
            }
        }

        // --- 드래그 핸들러 ---
        function onMouseDown(e) {
            if (e.button !== 0 || e.target.closest('button')) return;
            state.isDragging = true;
            state.lastPos = { x: e.clientX, y: e.clientY };
            mapContainer.style.cursor = 'grabbing';
        }

        function onMouseMove(e) {
            if (!state.isDragging) return;
            const dx = e.clientX - state.lastPos.x;
            const dy = e.clientY - state.lastPos.y;
            state.transform.x += dx;
            state.transform.y += dy;
            state.lastPos = { x: e.clientX, y: e.clientY };
            applyTransform();
        }

        function onTouchStart(e) {
            if (e.touches.length !== 1 || e.target.closest('button')) return;
            state.isDragging = true;
            state.lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }

        function onTouchMove(e) {
            if (!state.isDragging || e.touches.length !== 1) return;
            e.preventDefault(); // 스크롤 방지
            const dx = e.touches[0].clientX - state.lastPos.x;
            const dy = e.touches[0].clientY - state.lastPos.y;
            state.transform.x += dx;
            state.transform.y += dy;
            state.lastPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            applyTransform();
        }

        function stopDragging() {
            state.isDragging = false;
            mapContainer.style.cursor = 'grab';
        }

        // --- 실행 ---
        window.onload = init;

    </script>
