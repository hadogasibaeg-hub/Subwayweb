<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울 메트로 맵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #map-layer {
            transform-origin: 0 0;
            will-change: transform;
        }

        .station-node {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .station-circle {
            width: 14px;
            height: 14px;
            background: white;
            border: 3px solid #334155;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .station-circle:hover { transform: scale(1.3); }
        .station-circle.selected { transform: scale(1.6); border-color: #6366f1 !important; box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); }

        .station-label {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 11px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            color: #cbd5e1;
        }

        .dead-section-icon {
            fill: #fbbf24;
            filter: drop-shadow(0 0 4px rgba(251, 191, 36, 1));
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen w-screen relative">

    <aside id="sidebar" class="fixed left-0 top-0 z-[110] h-full w-72 bg-[#1e293b] shadow-2xl transition-transform duration-300 translate-x-0">
        <div class="p-6 flex flex-col h-full">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
                    <span class="p-1.5 bg-indigo-600 rounded-md">🚇</span> 메트로 맵
                </h1>
                <button onclick="toggleMenu()" class="p-2 hover:bg-white/10 rounded-full text-slate-400">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
            </div>

            <div class="relative mb-6">
                <input id="search-input" class="w-full bg-slate-900 border border-white/10 rounded-xl py-3 pl-10 pr-4 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="역 이름 검색..." oninput="handleSearch()">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
                <div id="line-filters" class="space-y-1.5"></div>
            </div>
        </div>
    </aside>

    <main id="map-container" class="relative flex-1 bg-[#0b1120] overflow-hidden cursor-grab">
        <button id="menu-btn" onclick="toggleMenu()" class="hidden absolute top-6 left-6 z-50 p-3 bg-indigo-600 rounded-xl shadow-lg">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <div id="map-layer" class="absolute inset-0">
            <svg id="svg-layer" width="5000" height="5000" class="absolute top-0 left-0 pointer-events-none overflow-visible"></svg>
            <div id="station-layer" class="absolute top-0 left-0 w-[5000px] h-[5000px]"></div>
        </div>

        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-slate-900/90 backdrop-blur-xl px-6 py-3 rounded-2xl border border-white/10 shadow-2xl z-[100]">
            <button onclick="handleZoom(0.8)" class="text-slate-400 hover:text-white transition-colors">➖</button>
            <span id="zoom-text" class="text-xs font-mono text-indigo-400 font-bold w-12 text-center">70%</span>
            <button onclick="handleZoom(1.2)" class="text-slate-400 hover:text-white transition-colors">➕</button>
            <div class="w-px h-4 bg-white/20 mx-1"></div>
            <button onclick="resetView()" class="text-xs text-slate-400 hover:text-white font-bold transition-colors">RESET</button>
        </div>

        <div id="detail-card" class="hidden absolute bottom-24 right-8 w-64 bg-slate-900/95 backdrop-blur-md border border-white/10 rounded-2xl p-5 shadow-2xl z-[100]">
            <h2 id="detail-title" class="text-xl font-black mb-4"></h2>
            <div id="detail-lines" class="flex flex-wrap gap-2"></div>
            <button onclick="closeDetail()" class="w-full mt-5 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-xl text-[10px] font-bold transition-colors">닫기</button>
        </div>
    </main>

            transform: { x: -800, y: -1500, scale: 0.65 },
            isDragging: false,
            lastPos: { x: 0, y: 0 },
            selectedStation: null,
            highlightLine: null
        };

            line.stations.forEach(s => {
                if (!stationMembership[s]) stationMembership[s] = [];
                stationMembership[s].push({ id, color: line.color, name: line.name });
            });
        });

        function renderMap() {
            const svg = document.getElementById('svg-layer');
            const stationLayer = document.getElementById('station-layer');
            svg.innerHTML = '';
            stationLayer.innerHTML = '';

            const segmentMap = new Map();
            
            Object.entries(lines).forEach(([lineId, line]) => {
                const paths = line.segments ? line.segments : [line.stations];
                paths.forEach(path => {
                    for (let i = 0; i < path.length - 1; i++) {
                        const s1 = path[i], s2 = path[i+1];
                        if (!stationsData[s1] || !stationsData[s2]) continue;
                        const key = [s1, s2].sort().join(':::');
                        if (!segmentMap.has(key)) segmentMap.set(key, []);
                        const list = segmentMap.get(key);
                        if (!list.includes(lineId)) list.push(lineId);
                    }
                });
            });

            segmentMap.forEach((lineIds, key) => {
                const [n1, n2] = key.split(':::');
                const p1 = stationsData[n1], p2 = stationsData[n2];
                const total = lineIds.length;
                const strokeWidth = 9;
                const gap = 11;

                lineIds.forEach((id, idx) => {
                    const offset = (idx - (total - 1) / 2) * gap;
                    const dx = p2.x - p1.x, dy = p2.y - p1.y;
                    const len = Math.sqrt(dx*dx + dy*dy);
                    const nx = -dy/len, ny = dx/len;

                    const isDimmed = state.highlightLine && state.highlightLine !== lines[id].name;
                    
                    const poly = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    poly.setAttribute("x1", p1.x + nx * offset);
                    poly.setAttribute("y1", p1.y + ny * offset);
                    poly.setAttribute("x2", p2.x + nx * offset);
                    poly.setAttribute("y2", p2.y + ny * offset);
                    poly.setAttribute("stroke", lines[id].color);
                    poly.setAttribute("stroke-width", strokeWidth);
                    poly.setAttribute("stroke-linecap", "round");
                    poly.style.opacity = isDimmed ? 0.08 : 0.85;
                    poly.style.transition = "opacity 0.3s ease";
                    svg.appendChild(poly);

                    if (deadSections.some(ds => (ds.from === n1 && ds.to === n2) || (ds.from === n2 && ds.to === n1))) {
                        const mx = (p1.x + p2.x) / 2 + nx * offset;
                        const my = (p1.y + p2.y) / 2 + ny * offset;
                        renderLightning(mx, my, svg);
                    }
                });
            });

            Object.entries(stationsData).forEach(([name, pos]) => {
                const myLines = stationMembership[name] || [];
                const uniqueLineNames = [...new Set(myLines.map(l => l.name))];
                const isTransfer = uniqueLineNames.length > 1;
                const isSelected = state.selectedStation === name;
                
                const node = document.createElement('div');
                node.className = 'station-node';
                node.style.left = `${pos.x}px`;
                node.style.top = `${pos.y}px`;
                
                const circle = document.createElement('div');
                circle.className = `station-circle ${isSelected ? 'selected' : ''}`;
                if (!isTransfer && myLines[0]) circle.style.borderColor = myLines[0].color;
                circle.onclick = (e) => selectStation(e, name);

                const label = document.createElement('div');
                label.className = `station-label ${isSelected ? 'text-indigo-400 font-black' : ''}`;
                label.innerText = name;

                node.append(circle, label);
                stationLayer.appendChild(node);
            });
        }

        function renderLightning(x, y, svg) {
            const lightning = document.createElementNS("http://www.w3.org/2000/svg", "path");
            lightning.setAttribute("d", "M-4,-6 L2,-1 L-1,0 L4,6 L-2,1 L1,0 Z");
            lightning.setAttribute("transform", `translate(${x}, ${y}) scale(1.5)`);
            lightning.setAttribute("class", "dead-section-icon");
            svg.appendChild(lightning);
        }

        function applyTransform() {
            document.getElementById('map-layer').style.transform = `translate(${state.transform.x}px, ${state.transform.y}px) scale(${state.transform.scale})`;
            document.getElementById('zoom-text').innerText = `${Math.round(state.transform.scale * 100)}%`;
        }

        function handleZoom(factor) {
            const container = document.getElementById('map-container');
            const centerX = container.clientWidth / 2;
            const centerY = container.clientHeight / 2;
            const oldScale = state.transform.scale;
            state.transform.scale = Math.max(0.1, Math.min(3, oldScale * factor));
            const relX = (centerX - state.transform.x) / oldScale;
            const relY = (centerY - state.transform.y) / oldScale;
            state.transform.x = centerX - relX * state.transform.scale;
            state.transform.y = centerY - relY * state.transform.scale;
            applyTransform();
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('menu-btn').classList.toggle('hidden');
        }

        function selectStation(e, name) {
            e.stopPropagation();
            state.selectedStation = name;
            const pos = stationsData[name];
            const container = document.getElementById('map-container');
            state.transform.x = (container.clientWidth / 2) - (pos.x * state.transform.scale);
            state.transform.y = (container.clientHeight / 2) - (pos.y * state.transform.scale);
            renderMap();
            applyTransform();

            const card = document.getElementById('detail-card');
            card.classList.remove('hidden');
            document.getElementById('detail-title').innerText = name;
            
            const myLines = stationMembership[name] || [];
            const uniqueLines = [];
            const seen = new Set();
            myLines.forEach(l => {
                if (!seen.has(l.name)) {
                    uniqueLines.push(l);
                    seen.add(l.name);
                }
            });

            document.getElementById('detail-lines').innerHTML = uniqueLines.map(l => `
                <div class="flex items-center gap-2 px-2.5 py-1.5 bg-white/5 rounded-lg border border-white/10">
                    <div class="w-2 h-2 rounded-full" style="background:${l.color}"></div>
                    <span class="text-[9px] font-bold text-slate-300">${l.name}</span>
                </div>
            `).join('');
        }

        function closeDetail() {
            document.getElementById('detail-card').classList.add('hidden');
            state.selectedStation = null;
            renderMap();
        }

        function resetView() {
            state.transform = { x: -800, y: -1500, scale: 0.65 };
            state.highlightLine = null;
            state.selectedStation = null;
            renderMap();
            applyTransform();
        }

        function handleSearch() {
            const term = document.getElementById('search-input').value.trim();
            if (stationsData[term]) {
                selectStation({stopPropagation: () => {}}, term);
            }
        }

        const container = document.getElementById('map-container');
        container.onmousedown = (e) => {
            if(e.target.closest('button') || e.target.closest('.station-circle')) return;
            state.isDragging = true;
            state.lastPos = { x: e.clientX, y: e.clientY };
            container.style.cursor = 'grabbing';
        };
        window.onmousemove = (e) => {
            if (!state.isDragging) return;
            state.transform.x += (e.clientX - state.lastPos.x);
            state.transform.y += (e.clientY - state.lastPos.y);
            state.lastPos = { x: e.clientX, y: e.clientY };
            applyTransform();
        };
        window.onmouseup = () => {
            state.isDragging = false;
            container.style.cursor = 'grab';
        };

        function initFilters() {
            const filterDiv = document.getElementById('line-filters');
            Object.entries(lines).forEach(([id, line]) => {
                const btn = document.createElement('button');
                btn.className = 'w-full flex items-center gap-3 p-3 rounded-xl border border-transparent bg-white/5 hover:bg-white/10 transition-all text-left';
                btn.innerHTML = `
                    <div class="w-2.5 h-2.5 rounded-full" style="background:${line.color}"></div>
                    <span class="text-xs font-semibold text-slate-300">${line.name}</span>
                `;
                btn.onclick = () => {
                    state.highlightLine = state.highlightLine === line.name ? null : line.name;
                    document.querySelectorAll('#line-filters button').forEach(b => b.classList.remove('border-indigo-500', 'bg-indigo-500/10'));
                    if(state.highlightLine) btn.classList.add('border-indigo-500', 'bg-indigo-500/10');
                    renderMap();
                };
                filterDiv.appendChild(btn);
            });
        }

        window.onload = () => {
            initFilters();
            renderMap();
            applyTransform();
        };
    </script>
</body>
</html>
